name: CI

on: [push, pull_request]

jobs:
  skip_check:
    runs-on: ubuntu-latest
    outputs:
      should_skip: ${{ steps.skip_check.outputs.should_skip }}
    steps:
      - id: skip_check
        uses: fkirc/skip-duplicate-actions@master

  run_cljvm_matrix:
    needs: skip_check
    if: ${{ needs.skip_check.outputs.should_skip != 'true' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java-version: [ 8, 11, 17, 21, 24 ]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: ${{ matrix.java-version }}
      - uses: DeLaGuardo/setup-clojure@13.4
        with:
          cli: latest
      - uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.clojure
            ~/.cpcache
          key: ${{ runner.os }}-${{ hashFiles('**/deps.edn') }}
      - name: Run CI checks (ClojureJVM)
        run: clojure -Srepro -J-Dclojure.main.report=stderr -T:build ci

  run_cljs:
    needs: skip_check
    if: ${{ needs.skip_check.outputs.should_skip != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: 24           # shadow-cljs depends on the JVM
      - uses: actions/setup-node@v5
        with:
          node-version: 'lts/*'
      - name: Compile unit tests
        run: |
          npm install source-map-support
          npx shadow-cljs compile test
      - name: Run unit tests (ClojureScript)
        run: node --enable-source-maps target/cljs/unit-tests.js

  # Adapted from https://brunoscheufler.com/blog/2022-04-09-the-required-github-status-check-that-wasnt
  after_ci_matrix:
    needs: [run_cljvm_matrix, run_cljs]
    runs-on: ubuntu-latest
    if: success()
    outputs:
      success: ${{ steps.setoutput.outputs.success }}
    steps:
      - id: setoutput
        run: echo "::set-output name=success::true"

  CI:
    runs-on: ubuntu-latest
    if: always()
    needs: [skip_check, after_ci_matrix]
    steps:
      - run: |
          skipped="${{ needs.skip_check.outputs.should_skip }}"
          passed="${{ needs.after_ci_matrix.outputs.success }}"
          if [[ $skipped == "true" ]]; then
            echo "CI matrix skipped"
            exit 0
          elif [[ $passed == "true" ]]; then
            echo "CI matrix passed"
            exit 0
          else
            echo "CI matrix failed"
            exit 1
          fi
